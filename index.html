<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <p>Calculator</p>
  <div class="calculator">
    <input type="text" value="1234567890" class="display">
    <div class="buttons">
      <div class="erase">
        <button>C</button>
        <button>Back</button>
      </div>
      <div class="calculation">
        <div class="numbers">
          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>1</button>
          <button>2</button>
          <button>3</button>
          <span></span>
          <button>0</button>
          <button>.</button>
        </div>
        <div class="operations">
          <button>÷</button>
          <button>×</button>
          <button>-</button>
          <button>+</button>
          <button>=</button>
        </div>
      </div>
    </div>
  </div>
</body>
